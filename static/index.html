<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockPulse — Intelligence Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0b0f1a;
            --bg-card: #111827;
            --bg-card-hover: #1a2234;
            --border: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
            --accent-purple: #a855f7;
            --accent-amber: #f59e0b;
            --gradient-1: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
        }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Header ────────────────────────────── */
        .header {
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: rgba(11,15,26,0.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .logo-icon {
            width: 32px; height: 32px;
            background: var(--gradient-1);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
        }
        .header-meta {
            font-size: 0.82rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        /* ── Layout ────────────────────────────── */
        .app-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: calc(100vh - 65px);
        }

        /* ── Sidebar ───────────────────────────── */
        .sidebar {
            border-right: 1px solid var(--border);
            padding: 20px 0;
            overflow-y: auto;
        }
        .sidebar-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            padding: 0 20px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .company-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.15s;
            border-left: 3px solid transparent;
        }
        .company-item:hover { background: var(--bg-card-hover); }
        .company-item.active {
            background: var(--bg-card);
            border-left-color: var(--accent-blue);
        }
        .company-symbol {
            font-weight: 600;
            font-size: 0.95rem;
            font-family: 'JetBrains Mono', monospace;
        }
        .company-name {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .company-price {
            text-align: right;
        }
        .company-price .price {
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
        }
        .company-price .change {
            font-size: 0.72rem;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
        }
        .change.positive { color: var(--accent-green); }
        .change.negative { color: var(--accent-red); }

        /* ── Compare Toggle ────────────────────── */
        .compare-section {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            margin-top: 12px;
        }
        .compare-btn {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 500;
            transition: all 0.15s;
        }
        .compare-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
        .compare-btn.active { background: var(--accent-blue); color: white; border-color: var(--accent-blue); }

        .compare-select {
            margin-top: 10px;
            display: none;
        }
        .compare-select.visible { display: block; }
        .compare-select select {
            width: 100%;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }
        .compare-go {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: none;
            background: var(--gradient-1);
            color: white;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.82rem;
        }

        /* ── Main Content ──────────────────────── */
        .main {
            padding: 24px 32px;
            overflow-y: auto;
        }

        /* ── Stat Cards ────────────────────────── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            transition: transform 0.15s, border-color 0.15s;
        }
        .stat-card:hover { transform: translateY(-2px); border-color: var(--accent-blue); }
        .stat-label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }
        .stat-sub {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* ── Chart Container ───────────────────── */
        .chart-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .chart-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .chart-title {
            font-size: 1.05rem;
            font-weight: 600;
        }
        .chart-controls {
            display: flex;
            gap: 6px;
        }
        .chart-controls button {
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .chart-controls button:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
        .chart-controls button.active { background: var(--accent-blue); color: white; border-color: var(--accent-blue); }

        .chart-wrapper {
            position: relative;
            height: 360px;
        }

        /* ── AI Prediction ──────────────────────── */
        .predict-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 24px;
            border-left: 3px solid var(--accent-purple);
        }
        .predict-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            color: white;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .predict-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(139,92,246,0.3); }
        .predict-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .predict-meta {
            display: flex;
            gap: 20px;
            margin-top: 14px;
            flex-wrap: wrap;
        }
        .predict-meta-item {
            font-size: 0.78rem;
            color: var(--text-muted);
        }
        .predict-meta-item span {
            color: var(--accent-purple);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
        }
        .disclaimer {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 12px;
            padding: 8px 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 6px;
            border-left: 2px solid var(--accent-amber);
        }

        /* ── Insights Grid ─────────────────────── */
        .insights-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        .insight-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }
        .insight-title {
            font-size: 0.82rem;
            font-weight: 600;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ── Top Movers ────────────────────────── */
        .mover-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .mover-row:last-child { border-bottom: none; }
        .mover-symbol {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .mover-change {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 4px;
        }
        .mover-change.positive { color: var(--accent-green); background: rgba(34,197,94,0.1); }
        .mover-change.negative { color: var(--accent-red); background: rgba(239,68,68,0.1); }

        /* ── Welcome State ─────────────────────── */
        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 70vh;
            text-align: center;
        }
        .welcome h2 {
            font-size: 1.8rem;
            margin-bottom: 12px;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .welcome p { color: var(--text-muted); max-width: 400px; }

        /* ── Loading ───────────────────────────── */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: var(--text-muted);
        }
        .spinner {
            width: 24px; height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Responsive ────────────────────────── */
        @media (max-width: 768px) {
            .app-layout { grid-template-columns: 1fr; }
            .sidebar {
                border-right: none;
                border-bottom: 1px solid var(--border);
                max-height: 200px;
            }
            .insights-grid { grid-template-columns: 1fr; }
            .main { padding: 16px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">
        <div class="logo-icon">📊</div>
        <span>StockPulse</span>
    </div>
    <div class="header-meta" id="headerMeta">Loading...</div>
</div>

<div class="app-layout">
    <!-- Sidebar: Company List -->
    <div class="sidebar">
        <div class="sidebar-title">Companies</div>
        <div id="companyList"></div>

        <div class="compare-section">
            <button class="compare-btn" id="compareToggle" onclick="toggleCompare()">
                ⚖️ Compare Stocks
            </button>
            <div class="compare-select" id="comparePanel">
                <select id="compare1"></select>
                <select id="compare2"></select>
                <button class="compare-go" onclick="runCompare()">Compare</button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main" id="mainContent">
        <div class="welcome" id="welcomeView">
            <h2>Stock Data Intelligence</h2>
            <p>Select a company from the sidebar to explore price history, analytics, and insights.</p>
        </div>
    </div>
</div>

<script>
const API = '';  // same origin
let priceChart = null;
let currentSymbol = null;
let companies = [];

// ── Initialization ──────────────────────────────
async function init() {
    try {
        const res = await fetch(`${API}/companies`);
        const data = await res.json();
        companies = data.companies;
        renderCompanyList(companies);
        populateCompareDropdowns(companies);
        document.getElementById('headerMeta').textContent =
            `${companies.length} stocks · NSE India`;
        loadTopMovers();
    } catch (e) {
        document.getElementById('companyList').innerHTML =
            '<div style="padding:20px;color:var(--accent-red)">Failed to load data. Ensure the API server is running.</div>';
    }
}

// ── Render Company List ─────────────────────────
function renderCompanyList(companies) {
    const list = document.getElementById('companyList');
    list.innerHTML = companies.map(c => {
        const changeClass = c.daily_return >= 0 ? 'positive' : 'negative';
        const changeSign = c.daily_return >= 0 ? '+' : '';
        return `
            <div class="company-item" data-symbol="${c.symbol}" onclick="selectCompany('${c.symbol}')">
                <div>
                    <div class="company-symbol">${c.symbol}</div>
                    <div class="company-name">${c.name}</div>
                </div>
                <div class="company-price">
                    <div class="price">₹${c.latest_price?.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2}) || '—'}</div>
                    <div class="change ${changeClass}">${changeSign}${(c.daily_return * 100).toFixed(2)}%</div>
                </div>
            </div>`;
    }).join('');
}

// ── Select Company ──────────────────────────────
async function selectCompany(symbol) {
    currentSymbol = symbol;
    document.querySelectorAll('.company-item').forEach(el => el.classList.remove('active'));
    document.querySelector(`[data-symbol="${symbol}"]`)?.classList.add('active');
    document.getElementById('welcomeView')?.remove();

    const main = document.getElementById('mainContent');
    main.innerHTML = '<div class="loading"><div class="spinner"></div>Loading data...</div>';

    try {
        const [summaryRes, dataRes] = await Promise.all([
            fetch(`${API}/summary/${symbol}`),
            fetch(`${API}/data/${symbol}?days=30`),
        ]);
        const summary = await summaryRes.json();
        const stockData = await dataRes.json();

        renderDashboard(summary, stockData);
    } catch (e) {
        main.innerHTML = '<div class="loading" style="color:var(--accent-red)">Error loading data</div>';
    }
}

// ── Render Full Dashboard ───────────────────────
function renderDashboard(summary, stockData) {
    const s = summary.summary;
    const sym = summary.symbol;
    const retClass = s.total_return_pct >= 0 ? 'positive' : 'negative';
    const retSign = s.total_return_pct >= 0 ? '+' : '';

    document.getElementById('mainContent').innerHTML = `
        <!-- Stat Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Current Price</div>
                <div class="stat-value">₹${s.current_price.toLocaleString('en-IN')}</div>
                <div class="stat-sub">${summary.name}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">52-Week High</div>
                <div class="stat-value" style="color:var(--accent-green)">₹${s.high_52w.toLocaleString('en-IN')}</div>
                <div class="stat-sub">Period high</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">52-Week Low</div>
                <div class="stat-value" style="color:var(--accent-red)">₹${s.low_52w.toLocaleString('en-IN')}</div>
                <div class="stat-sub">Period low</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg Close</div>
                <div class="stat-value">₹${s.avg_close.toLocaleString('en-IN')}</div>
                <div class="stat-sub">${s.data_points} data points</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Return</div>
                <div class="stat-value change ${retClass}">${retSign}${s.total_return_pct}%</div>
                <div class="stat-sub">${s.date_range.from} → ${s.date_range.to}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Volatility</div>
                <div class="stat-value">${(s.current_volatility * 100).toFixed(1)}%</div>
                <div class="stat-sub">Annualized</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Momentum (RSI)</div>
                <div class="stat-value" style="color:${s.current_momentum > 70 ? 'var(--accent-green)' : s.current_momentum < 30 ? 'var(--accent-red)' : 'var(--accent-amber)'}">${s.current_momentum}</div>
                <div class="stat-sub">${s.current_momentum > 70 ? 'Overbought' : s.current_momentum < 30 ? 'Oversold' : 'Neutral'}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg Volume</div>
                <div class="stat-value">${formatVolume(s.avg_volume)}</div>
                <div class="stat-sub">Daily average</div>
            </div>
        </div>

        <!-- Price Chart -->
        <div class="chart-section">
            <div class="chart-header">
                <div class="chart-title">📈 ${sym} — Closing Price & Moving Average</div>
                <div class="chart-controls">
                    <button onclick="loadChart('${sym}', 30)" class="active" id="btn30">30D</button>
                    <button onclick="loadChart('${sym}', 90)" id="btn90">90D</button>
                    <button onclick="loadChart('${sym}', 180)" id="btn180">180D</button>
                    <button onclick="loadChart('${sym}', 365)" id="btn365">1Y</button>
                </div>
            </div>
            <div class="chart-wrapper">
                <canvas id="priceCanvas"></canvas>
            </div>
        </div>

        <!-- Insights -->
        <div class="insights-grid" id="insightsGrid">
            <div class="insight-card" id="gainersCard">
                <div class="insight-title">🟢 Top Gainers</div>
                <div id="gainersList"></div>
            </div>
            <div class="insight-card" id="losersCard">
                <div class="insight-title">🔴 Top Losers</div>
                <div id="losersList"></div>
            </div>
        </div>

        <!-- AI Prediction -->
        <div class="predict-section">
            <div class="chart-header">
                <div class="chart-title">🧠 AI Price Prediction — Linear Regression</div>
                <button class="predict-btn" id="predictBtn" onclick="loadPrediction('${sym}')">
                    Generate 7-Day Forecast
                </button>
            </div>
            <div id="predictContent">
                <p style="color:var(--text-muted);font-size:0.85rem;">Click the button to run a Linear Regression model on recent data and forecast the next 7 trading days.</p>
            </div>
        </div>
    `;

    // Render chart
    renderChart(stockData.data);

    // Load top movers
    loadTopMovers();
}

// ── Chart Rendering ─────────────────────────────
function renderChart(data) {
    const ctx = document.getElementById('priceCanvas')?.getContext('2d');
    if (!ctx) return;

    if (priceChart) priceChart.destroy();

    const sorted = [...data].sort((a, b) => a.date.localeCompare(b.date));
    const labels = sorted.map(d => d.date);
    const closes = sorted.map(d => d.close);
    const ma7 = sorted.map(d => d.ma_7);

    priceChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels,
            datasets: [
                {
                    label: 'Close Price',
                    data: closes,
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59,130,246,0.08)',
                    borderWidth: 2,
                    fill: true,
                    pointRadius: 0,
                    pointHoverRadius: 5,
                    tension: 0.3,
                },
                {
                    label: '7-Day MA',
                    data: ma7,
                    borderColor: '#f59e0b',
                    borderWidth: 1.5,
                    borderDash: [6, 3],
                    fill: false,
                    pointRadius: 0,
                    tension: 0.3,
                },
            ],
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { intersect: false, mode: 'index' },
            plugins: {
                legend: {
                    labels: { color: '#94a3b8', font: { family: "'DM Sans'" }, usePointStyle: true, pointStyle: 'line' }
                },
                tooltip: {
                    backgroundColor: '#1e293b',
                    titleFont: { family: "'JetBrains Mono'" },
                    bodyFont: { family: "'JetBrains Mono'" },
                    callbacks: {
                        label: ctx => `${ctx.dataset.label}: ₹${ctx.parsed.y.toLocaleString('en-IN', {minimumFractionDigits:2})}`
                    }
                }
            },
            scales: {
                x: {
                    ticks: { color: '#64748b', maxTicksLimit: 8, font: { family: "'JetBrains Mono'", size: 10 } },
                    grid: { color: 'rgba(255,255,255,0.04)' },
                },
                y: {
                    ticks: {
                        color: '#64748b',
                        font: { family: "'JetBrains Mono'", size: 10 },
                        callback: v => '₹' + v.toLocaleString('en-IN')
                    },
                    grid: { color: 'rgba(255,255,255,0.04)' },
                }
            }
        }
    });
}

// ── Load chart with different timeframes ────────
async function loadChart(symbol, days) {
    document.querySelectorAll('.chart-controls button').forEach(b => b.classList.remove('active'));
    document.getElementById(`btn${days}`)?.classList.add('active');

    const res = await fetch(`${API}/data/${symbol}?days=${days}`);
    const data = await res.json();
    renderChart(data.data);
}

// ── Top Movers ──────────────────────────────────
async function loadTopMovers() {
    try {
        const res = await fetch(`${API}/top-movers`);
        const data = await res.json();

        const renderMovers = (items, elId) => {
            const el = document.getElementById(elId);
            if (!el) return;
            el.innerHTML = items.map(m => {
                const cls = m.daily_return >= 0 ? 'positive' : 'negative';
                const sign = m.daily_return >= 0 ? '+' : '';
                return `<div class="mover-row">
                    <span class="mover-symbol">${m.symbol}</span>
                    <span class="mover-change ${cls}">${sign}${(m.daily_return * 100).toFixed(2)}%</span>
                </div>`;
            }).join('');
        };

        renderMovers(data.gainers, 'gainersList');
        renderMovers(data.losers, 'losersList');
    } catch (e) {}
}

// ── AI Prediction ───────────────────────────────
let predictChart = null;

async function loadPrediction(symbol) {
    const btn = document.getElementById('predictBtn');
    const content = document.getElementById('predictContent');
    btn.disabled = true;
    btn.textContent = '⏳ Training model...';
    content.innerHTML = '<div class="loading"><div class="spinner"></div>Running Linear Regression model...</div>';

    try {
        const res = await fetch(`${API}/predict/${symbol}?days=7`);
        const data = await res.json();
        renderPrediction(data);
    } catch (e) {
        content.innerHTML = '<div style="color:var(--accent-red);font-size:0.85rem;">Failed to generate prediction. Please try again.</div>';
    } finally {
        btn.disabled = false;
        btn.textContent = 'Regenerate Forecast';
    }
}

function renderPrediction(data) {
    const content = document.getElementById('predictContent');

    // Combine historical + prediction for chart
    const historical = data.historical;
    const predictions = data.predictions;
    const lastHistDate = historical[historical.length - 1].date;
    const lastHistPrice = historical[historical.length - 1].close;

    // Labels: historical dates + prediction dates
    const allLabels = [
        ...historical.map(h => h.date),
        ...predictions.map(p => p.date),
    ];

    // Historical line: real prices + null for prediction zone
    const histLine = [
        ...historical.map(h => h.close),
        ...predictions.map(() => null),
    ];

    // Prediction line: null for historical + bridge from last real price + predictions
    const predLine = [
        ...historical.slice(0, -1).map(() => null),
        lastHistPrice,  // bridge point
        ...predictions.map(p => p.predicted_close),
    ];

    // Prediction table
    const predRows = predictions.map(p => {
        const change = ((p.predicted_close - data.current_price) / data.current_price * 100).toFixed(2);
        const cls = change >= 0 ? 'positive' : 'negative';
        const sign = change >= 0 ? '+' : '';
        return `<div class="mover-row">
            <span style="font-size:0.82rem;color:var(--text-secondary)">Day ${p.day} · ${p.date}</span>
            <span>
                <span style="font-family:'JetBrains Mono';font-weight:600;">₹${p.predicted_close.toLocaleString('en-IN')}</span>
                <span class="mover-change ${cls}" style="margin-left:8px;font-size:0.75rem;">${sign}${change}%</span>
            </span>
        </div>`;
    }).join('');

    content.innerHTML = `
        <div class="chart-wrapper" style="height:300px;margin-bottom:16px;">
            <canvas id="predictCanvas"></canvas>
        </div>
        <div class="predict-meta">
            <div class="predict-meta-item">Model: <span>${data.model}</span></div>
            <div class="predict-meta-item">R² Score: <span>${data.r2_score}</span></div>
            <div class="predict-meta-item">Training Days: <span>${data.training_days}</span></div>
            <div class="predict-meta-item">Features: <span>${data.features_used.length}</span></div>
        </div>
        <div style="margin-top:16px;">
            <div style="font-weight:600;font-size:0.85rem;margin-bottom:8px;">📅 7-Day Forecast</div>
            ${predRows}
        </div>
        <div class="disclaimer">⚠️ ${data.disclaimer}</div>
    `;

    // Render prediction chart
    const ctx = document.getElementById('predictCanvas').getContext('2d');
    if (predictChart) predictChart.destroy();

    predictChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: allLabels,
            datasets: [
                {
                    label: 'Historical Price',
                    data: histLine,
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59,130,246,0.06)',
                    borderWidth: 2,
                    fill: true,
                    pointRadius: 0,
                    tension: 0.3,
                },
                {
                    label: 'ML Prediction',
                    data: predLine,
                    borderColor: '#a855f7',
                    backgroundColor: 'rgba(168,85,247,0.1)',
                    borderWidth: 2.5,
                    borderDash: [6, 4],
                    fill: true,
                    pointRadius: 4,
                    pointBackgroundColor: '#a855f7',
                    pointBorderColor: '#1e293b',
                    pointBorderWidth: 2,
                    tension: 0.3,
                },
            ],
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { intersect: false, mode: 'index' },
            plugins: {
                legend: {
                    labels: { color: '#94a3b8', font: { family: "'DM Sans'" }, usePointStyle: true, pointStyle: 'line' }
                },
                tooltip: {
                    backgroundColor: '#1e293b',
                    titleFont: { family: "'JetBrains Mono'" },
                    bodyFont: { family: "'JetBrains Mono'" },
                    callbacks: {
                        label: ctx => ctx.parsed.y ? `${ctx.dataset.label}: ₹${ctx.parsed.y.toLocaleString('en-IN', {minimumFractionDigits:2})}` : ''
                    }
                }
            },
            scales: {
                x: {
                    ticks: { color: '#64748b', maxTicksLimit: 8, font: { family: "'JetBrains Mono'", size: 10 } },
                    grid: { color: 'rgba(255,255,255,0.04)' },
                },
                y: {
                    ticks: {
                        color: '#64748b',
                        font: { family: "'JetBrains Mono'", size: 10 },
                        callback: v => '₹' + v.toLocaleString('en-IN')
                    },
                    grid: { color: 'rgba(255,255,255,0.04)' },
                }
            }
        }
    });
}

// ── Compare Stocks ──────────────────────────────
function toggleCompare() {
    const panel = document.getElementById('comparePanel');
    const btn = document.getElementById('compareToggle');
    panel.classList.toggle('visible');
    btn.classList.toggle('active');
}

function populateCompareDropdowns(companies) {
    ['compare1', 'compare2'].forEach((id, i) => {
        const sel = document.getElementById(id);
        sel.innerHTML = companies.map(c =>
            `<option value="${c.symbol}" ${i === 1 && c.symbol === companies[1]?.symbol ? 'selected' : ''}>${c.symbol} — ${c.name}</option>`
        ).join('');
    });
}

async function runCompare() {
    const s1 = document.getElementById('compare1').value;
    const s2 = document.getElementById('compare2').value;
    if (s1 === s2) { alert('Select two different stocks'); return; }

    const main = document.getElementById('mainContent');
    main.innerHTML = '<div class="loading"><div class="spinner"></div>Comparing stocks...</div>';

    try {
        const res = await fetch(`${API}/compare?symbol1=${s1}&symbol2=${s2}`);
        const data = await res.json();
        renderComparison(data);
    } catch (e) {
        main.innerHTML = '<div class="loading" style="color:var(--accent-red)">Error comparing stocks</div>';
    }
}

    const c = data.comparison;
    const main = document.getElementById('mainContent');

    main.innerHTML = `
        <div class="stats-grid">
            <div class="stat-card" style="border-left: 3px solid var(--accent-blue);">
                <div class="stat-label">${c.stock1.symbol} Price</div>
                <div class="stat-value">₹${c.stock1.current_price.toLocaleString('en-IN')}</div>
                <div class="stat-sub change ${c.stock1.total_return_pct >= 0 ? 'positive' : 'negative'}">${c.stock1.total_return_pct >= 0 ? '+' : ''}${c.stock1.total_return_pct}% total return</div>
            </div>
            <div class="stat-card" style="border-left: 3px solid var(--accent-purple);">
                <div class="stat-label">${c.stock2.symbol} Price</div>
                <div class="stat-value">₹${c.stock2.current_price.toLocaleString('en-IN')}</div>
                <div class="stat-sub change ${c.stock2.total_return_pct >= 0 ? 'positive' : 'negative'}">${c.stock2.total_return_pct >= 0 ? '+' : ''}${c.stock2.total_return_pct}% total return</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Correlation</div>

            </div>
            <div class="stat-card">
                <div class="stat-label">Trading Days</div>
                <div class="stat-value">${c.common_trading_days}</div>
                <div class="stat-sub">Common dates</div>
            </div>
        </div>

        <div class="chart-section">
            <div class="chart-header">
                <div class="chart-title">⚖️ ${c.stock1.symbol} vs ${c.stock2.symbol} — Normalized Performance (Base 100)</div>
            </div>
            <div class="chart-wrapper">
                <canvas id="compareCanvas"></canvas>
            </div>
        </div>

        <div class="insights-grid">
            <div class="insight-card">
                <div class="insight-title">📊 ${c.stock1.symbol} Stats</div>
                <div class="mover-row"><span>Avg Daily Return</span><span class="mover-change ${c.stock1.avg_daily_return >= 0 ? 'positive' : 'negative'}">${c.stock1.avg_daily_return}%</span></div>
                <div class="mover-row"><span>Max Gain</span><span class="mover-change positive">+${c.stock1.max_daily_gain}%</span></div>
                <div class="mover-row"><span>Max Loss</span><span class="mover-change negative">${c.stock1.max_daily_loss}%</span></div>
                <div class="mover-row"><span>Volatility</span><span>${(c.stock1.volatility * 100).toFixed(1)}%</span></div>
            </div>
            <div class="insight-card">
                <div class="insight-title">📊 ${c.stock2.symbol} Stats</div>
                <div class="mover-row"><span>Avg Daily Return</span><span class="mover-change ${c.stock2.avg_daily_return >= 0 ? 'positive' : 'negative'}">${c.stock2.avg_daily_return}%</span></div>
                <div class="mover-row"><span>Max Gain</span><span class="mover-change positive">+${c.stock2.max_daily_gain}%</span></div>
                <div class="mover-row"><span>Max Loss</span><span class="mover-change negative">${c.stock2.max_daily_loss}%</span></div>
                <div class="mover-row"><span>Volatility</span><span>${(c.stock2.volatility * 100).toFixed(1)}%</span></div>
            </div>
        </div>
    `;

    // Render comparison chart
    const ctx = document.getElementById('compareCanvas').getContext('2d');
    const prices = data.normalized_prices;
    const sym1 = c.stock1.symbol, sym2 = c.stock2.symbol;

    if (priceChart) priceChart.destroy();
    priceChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: prices.map(p => p.date),
            datasets: [
                {
                    label: sym1,
                    data: prices.map(p => p[sym1]),
                    borderColor: '#3b82f6',
                    borderWidth: 2,
                    pointRadius: 0,
                    tension: 0.3,
                },
                {
                    label: sym2,
                    data: prices.map(p => p[sym2]),

                },
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { intersect: false, mode: 'index' },
            plugins: {
                legend: { labels: { color: '#94a3b8', font: { family: "'DM Sans'" }, usePointStyle: true, pointStyle: 'line' } },
                tooltip: { backgroundColor: '#1e293b' },
            },
            scales: {
                x: { ticks: { color: '#64748b', maxTicksLimit: 8, font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.04)' } },

}

// ── Helpers ──────────────────────────────────────
function formatVolume(v) {
    if (v >= 1e7) return (v / 1e7).toFixed(1) + 'Cr';
    if (v >= 1e5) return (v / 1e5).toFixed(1) + 'L';
    if (v >= 1e3) return (v / 1e3).toFixed(1) + 'K';
    return v.toString();
}

// ── Start ───────────────────────────────────────
init();
